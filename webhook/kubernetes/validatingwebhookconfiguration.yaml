apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: resource-requests-validator
  annotations:
    # cert-manager injects the CA bundle automatically when this annotation is present.
    cert-manager.io/inject-ca-from: webhook-system/resource-webhook-tls
spec:
  webhooks:
    - name: resource-requests.webhook.dreamgames.io
      admissionReviewVersions: ["v1"]
      sideEffects: None
      failurePolicy: Fail
      matchPolicy: Equivalent
      rules:
        - apiGroups:   ["apps"]
          apiVersions: ["v1"]
          resources:   ["deployments"]
          operations:  ["CREATE", "UPDATE"]
      # Exclude the webhook's own namespace and system namespaces to prevent bootstrap issues.
      namespaceSelector:
        matchExpressions:
          - key: webhook.dreamgames.io/skip
            operator: DoesNotExist
          - key: kubernetes.io/metadata.name
            operator: NotIn
            values: [kube-system, kube-public, webhook-system, cert-manager]
      clientConfig:
        service:
          name: resource-webhook
          namespace: webhook-system
          path: /validate
          port: 443
