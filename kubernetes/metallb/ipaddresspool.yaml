# MetalLB IP pool carved from the Vagrant private network (10.50.0.0/24).
# Used IPs: .10 (master), .11 (node-1), .12 (node-2).
# This pool (.20–.30) is free for LoadBalancer services.
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: vagrant-pool
  namespace: metallb-system
spec:
  addresses:
    - 10.50.0.20-10.50.0.30
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: vagrant-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - vagrant-pool
