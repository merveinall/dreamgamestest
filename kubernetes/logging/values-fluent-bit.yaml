# Fluent Bit Helm values — DaemonSet that ships all pod stdout to Elasticsearch.
# Chart: fluent/fluent-bit
#
# Suppress_Type_Name On is required for Elasticsearch 8.x (removed document types).
# Deploy with: bash scripts/09-deploy-logging.sh

config:
  service: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     warn
        Parsers_File  parsers.conf

  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        Tag               kube.*
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        Annotations         Off
        Labels              On

  outputs: |
    [OUTPUT]
        Name               es
        Match              kube.*
        Host               elasticsearch-master.logging.svc.cluster.local
        Port               9200
        Index              kubernetes-logs
        Logstash_Format    On
        Logstash_Prefix    kubernetes
        Suppress_Type_Name On
        Retry_Limit        False
        tls                Off
        tls.verify         Off

# Run on every node including control-plane
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
  - operator: Exists

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
