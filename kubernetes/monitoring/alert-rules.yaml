apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: dreamgames-alerts
  namespace: monitoring
  labels:
    # This label is picked up by the kube-prometheus-stack operator.
    release: kube-prometheus-stack
spec:
  groups:
    - name: pod-health
      interval: 1m
      rules:
        - alert: PodRestartingFrequently
          # Fires when a container restarts more than 0.5×/min averaged over 15 min.
          expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is restarting frequently"
            description: >-
              Container {{ $labels.container }} has restarted more than 0.5 times/min
              over the last 15 minutes. Investigate with:
              kubectl describe pod {{ $labels.pod }} -n {{ $labels.namespace }}

        - alert: PodCrashLooping
          expr: kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} == 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is in CrashLoopBackOff"
            description: "Container {{ $labels.container }} is crash-looping."
