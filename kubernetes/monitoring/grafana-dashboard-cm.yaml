apiVersion: v1
kind: ConfigMap
metadata:
  name: dreamgames-k8s-overview
  namespace: monitoring
  labels:
    # Grafana sidecar watches for this label and auto-imports the dashboard.
    grafana_dashboard: "1"
data:
  k8s-overview.json: |
    {
      "title": "Kubernetes Overview — dreamgames",
      "uid": "dg-k8s-overview",
      "schemaVersion": 38,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Running Pods",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(kube_pod_status_phase{phase=\"Running\"})",
              "legendFormat": "Running"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Node Count",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "count(kube_node_info)",
              "legendFormat": "Nodes"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "blue" }
            }
          }
        },
        {
          "id": 3,
          "title": "CPU Usage by Node",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "sum by (node) (rate(node_cpu_seconds_total{mode!=\"idle\"}[5m]))",
              "legendFormat": "{{node}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short", "displayName": "${__field.labels.node}" }
          }
        },
        {
          "id": 4,
          "title": "Memory Usage by Node",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "sum by (node) (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)",
              "legendFormat": "{{node}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes" }
          }
        },
        {
          "id": 5,
          "title": "Pod Restart Rate (per minute)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "sum by (pod, namespace) (rate(kube_pod_container_status_restarts_total[5m])) * 60",
              "legendFormat": "{{namespace}}/{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Value" },
                "properties": [
                  {
                    "id": "thresholds",
                    "value": {
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "yellow", "value": 0.1 },
                        { "color": "red", "value": 0.5 }
                      ]
                    }
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 6,
          "title": "sample-java-app Request Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{namespace=\"apps\"}[5m]))",
              "legendFormat": "req/s"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps" }
          }
        }
      ]
    }
