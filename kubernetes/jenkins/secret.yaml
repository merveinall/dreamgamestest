# Jenkins admin credentials.
# Replace <JENKINS_ADMIN_PASSWORD> before applying:
#   kubectl create secret generic jenkins-admin-secret \
#     --from-literal=jenkins-admin-user=admin \
#     --from-literal=jenkins-admin-password=<PASSWORD> \
#     -n jenkins --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: jenkins-admin-secret
  namespace: jenkins
type: Opaque
stringData:
  jenkins-admin-user: admin
  jenkins-admin-password: "adminadmin"
