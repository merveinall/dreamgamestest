# Jenkins Configuration as Code (JCasC).
# Mounted into the container; Jenkins reads it at startup via CASC_JENKINS_CONFIG.
# ${JENKINS_ADMIN_USER} and ${JENKINS_ADMIN_PASSWORD} are injected from the Secret.
apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-jcasc
  namespace: jenkins
data:
  jenkins.yaml: |
    jenkins:
      systemMessage: "dreamgames CI — managed by JCasC. Manual changes will be overwritten on restart."
      numExecutors: 0

      securityRealm:
        local:
          allowsSignup: false
          users:
            - id: "${JENKINS_ADMIN_USER}"
              password: "${JENKINS_ADMIN_PASSWORD}"

      authorizationStrategy:
        loggedInUsersCanDoAnything:
          allowAnonymousRead: false

      clouds:
        - kubernetes:
            name: "kubernetes"
            serverUrl: "https://kubernetes.default.svc"
            namespace: "jenkins"
            jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080"
            jenkinsTunnel: "jenkins.jenkins.svc.cluster.local:50000"
            connectTimeout: 5
            readTimeout: 15
            containerCapStr: "10"

    unclassified:
      location:
        url: "http://jenkins.local"
