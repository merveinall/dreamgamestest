# ExternalDNS TSIG secret for RFC2136/BIND authentication.
# Replace <BASE64_ENCODED_TSIG_SECRET> with your actual key:
#   echo -n "your-tsig-secret" | base64
#
# If your BIND zone allows unsigned dynamic updates from the pod CIDR,
# delete this Secret and remove the TSIG env vars from deployment.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: external-dns-rfc2136-tsig
  namespace: external-dns
type: Opaque
data:
  tsig-secret: Y2FnYXRheQ==
