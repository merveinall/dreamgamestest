# Kubeadm cluster configuration for dreamgames.
# Reference only — cluster is already initialised.
# To re-create: sudo kubeadm init --config kubeadm-config.yaml
apiVersion: kubeadm.k8s.io/v1beta3
kind: ClusterConfiguration
kubernetesVersion: v1.29.4
clusterName: dreamgames
controlPlaneEndpoint: "10.50.0.10:6443"
networking:
  podSubnet: "10.10.0.0/16"
  serviceSubnet: "10.20.0.0/16"
  dnsDomain: "cluster.local"
apiServer:
  certSANs:
    - "10.50.0.10"
    - "k8s-master"
    - "localhost"
    - "127.0.0.1"
etcd:
  local:
    dataDir: /var/lib/etcd
---
apiVersion: kubeadm.k8s.io/v1beta3
kind: InitConfiguration
localAPIEndpoint:
  advertiseAddress: "10.50.0.10"
  bindPort: 6443
nodeRegistration:
  name: k8s-master
  criSocket: "unix:///var/run/containerd/containerd.sock"
---
# Align cgroup driver with containerd default
apiVersion: kubelet.config.k8s.io/v1beta1
kind: KubeletConfiguration
cgroupDriver: systemd
