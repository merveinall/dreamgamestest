name: Build Deploy Tools Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to push'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push deploy tools image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy-tools.dockerfile
          push: true
          tags: merveinal1/jenkins-deploy-tools:${{ github.event.inputs.image_tag }}
